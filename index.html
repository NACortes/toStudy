<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Quintetas Movil</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2d33;
      --muted: #66777e;
      --paper: #fffaf0;
      --panel: #ffffff;
      --line: #d8ccb6;
      --teal: #197278;
      --teal-dark: #12565b;
      --sun: #f2c14e;
      --coral: #d95d39;
      --leaf: #5b8c5a;
      --blue: #2f6690;
      --shadow: 0 10px 24px rgba(31, 45, 51, 0.16);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      background:
        linear-gradient(160deg, rgba(242, 193, 78, 0.24), transparent 18rem),
        linear-gradient(180deg, #f6f1e6 0%, #e7f3f1 55%, #fff4ed 100%);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    button {
      border: 0;
      border-radius: 8px;
      color: inherit;
      cursor: pointer;
      font: inherit;
      touch-action: manipulation;
    }

    .app {
      min-height: 100vh;
      padding: 14px 12px 118px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: -14px -12px 12px;
      padding: 14px 12px 10px;
      background: rgba(246, 241, 230, 0.94);
      border-bottom: 1px solid rgba(216, 204, 182, 0.9);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .score {
      min-width: 92px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 7px 8px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(31, 45, 51, 0.08);
    }

    .score span {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .score strong {
      display: block;
      color: var(--teal-dark);
      font-size: 1.35rem;
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .quintetas {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin: 0 0 12px;
    }

    .q-button {
      min-height: 70px;
      padding: 10px;
      background: var(--panel);
      border: 2px solid var(--line);
      box-shadow: 0 5px 14px rgba(31, 45, 51, 0.08);
      text-align: left;
    }

    .q-button.active {
      background: #e7f5f3;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(25, 114, 120, 0.15);
    }

    .q-title {
      display: block;
      font-size: 0.98rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .q-detail {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .practice {
      overflow: hidden;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.93);
      box-shadow: var(--shadow);
    }

    .practice-head {
      display: grid;
      gap: 4px;
      padding: 13px;
      background: #fff7e4;
      border-bottom: 2px solid var(--line);
    }

    .practice-head h2 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .progress {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .card-wrap {
      padding: 14px;
    }

    .flashcard {
      width: 100%;
      min-height: 248px;
      padding: 16px 10px;
      border: 3px dashed var(--teal);
      background: #ffffff;
      display: grid;
      place-items: center;
      user-select: none;
    }

    .problem {
      display: grid;
      grid-template-columns: auto auto auto;
      align-items: center;
      justify-content: center;
      gap: 10px 13px;
      font-size: 3.4rem;
      font-weight: 900;
      line-height: 1;
      text-align: center;
    }

    .equals {
      grid-column: 1;
    }

    .answer {
      grid-column: 2 / span 2;
      min-width: 1.7em;
      border: 4px solid var(--ink);
      border-radius: 8px;
      padding: 2px 8px 7px;
      background: #fff;
      color: transparent;
    }

    .flashcard.revealed .answer {
      border-color: var(--coral);
      background: #fff0eb;
      color: var(--coral);
    }

    .hint {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1.3;
      text-align: center;
    }

    .mini-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border-top: 2px solid var(--line);
      background: #f5fbfa;
    }

    .mini {
      min-height: 48px;
      padding: 8px 6px;
      background: #fff;
      border: 2px solid #d7e4e2;
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 0.95rem;
      font-weight: 900;
      text-align: center;
    }

    .mini.done {
      background: #f3fbf1;
      border-color: rgba(91, 140, 90, 0.55);
      color: var(--leaf);
    }

    .controls {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 8;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      background: rgba(255, 250, 240, 0.96);
      border-top: 1px solid rgba(216, 204, 182, 0.95);
      box-shadow: 0 -8px 22px rgba(31, 45, 51, 0.13);
      backdrop-filter: blur(10px);
    }

    .control {
      min-height: 48px;
      padding: 6px 8px;
      background: var(--teal);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 900;
    }

    .control.primary {
      background: var(--coral);
    }

    .control.review {
      background: var(--blue);
    }

    .control.secondary {
      background: #ffffff;
      border: 2px solid var(--line);
      color: var(--ink);
    }

    .control:disabled {
      opacity: 0.48;
    }

    @media (min-width: 520px) {
      .app {
        width: min(520px, 100%);
        margin: 0 auto;
      }

      .problem {
        font-size: 4.2rem;
      }

      .controls {
        left: 50%;
        width: min(520px, 100%);
        transform: translateX(-50%);
        border-right: 1px solid rgba(216, 204, 182, 0.95);
        border-left: 1px solid rgba(216, 204, 182, 0.95);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="top-row">
        <h1>Quintetas</h1>
        <div class="score" aria-live="polite">
          <span>Resueltas</span>
          <strong id="score">0 / 5</strong>
        </div>
      </div>
      <p class="subtitle">Elige una quinteta y toca la tarjeta para descubrir la respuesta.</p>
    </header>

    <nav class="quintetas" id="quintetaButtons" aria-label="Seleccionar quinteta"></nav>

    <section class="practice" id="practice" aria-label="Practica de multiplicaciones">
      <div class="practice-head">
        <h2 id="quintetaTitle">Quinteta 1</h2>
        <div class="progress" id="progress">Operacion 1 de 5</div>
      </div>

      <div class="card-wrap">
        <button class="flashcard" id="flashcard" type="button" aria-label="Mostrar resultado">
          <div>
            <div class="problem" id="problem"></div>
            <p class="hint" id="hint">Toca la tarjeta para ver el resultado</p>
          </div>
        </button>
      </div>

      <div class="mini-list" id="tableView" aria-label="Operaciones de la practica"></div>
    </section>
  </main>

  <div class="controls" aria-label="Controles de practica">
    <button class="control secondary" id="prevBtn" type="button">Anterior</button>
    <button class="control primary" id="revealBtn" type="button">Mostrar</button>
    <button class="control" id="nextBtn" type="button">Siguiente</button>
    <button class="control review" id="reviewBtn" type="button">Repaso</button>
    <button class="control secondary" id="shuffleBtn" type="button">Mezclar</button>
    <button class="control secondary" id="resetBtn" type="button">Reiniciar</button>
  </div>

  <script>
    const originalQuintetas = [
      [[6, 9], [7, 8], [7, 6], [6, 8], [4, 8]],
      [[4, 9], [7, 9], [7, 7], [6, 7], [4, 7]],
      [[7, 5], [5, 9], [8, 8], [9, 7], [8, 5]],
      [[9, 6], [3, 9], [8, 7], [5, 6], [4, 6]],
      [[9, 4], [5, 8], [3, 8], [8, 6], [7, 4]],
      [[6, 6], [9, 5], [8, 9], [3, 6], [8, 3]],
      [[4, 4], [8, 4], [9, 8], [4, 3], [5, 7]],
      [[9, 3], [4, 5], [3, 7], [6, 4], [6, 3]],
      [[6, 5], [3, 4], [5, 5], [9, 9], [5, 3]],
      [[5, 4], [0, 1], [7, 3], [3, 2], [6, 0]]
    ].map((items, index) => ({
      name: `Quinteta ${index + 1}`,
      items: items.map(([a, b], itemIndex) => ({
        a,
        b,
        answer: a * b,
        number: index * 5 + itemIndex + 1
      }))
    }));

    const quintetas = originalQuintetas.map(copyQuinteta);

    let currentQuinteta = 0;
    let currentIndex = 0;
    let revealed = false;
    let solved = new Set();
    let mode = "quinteta";
    let reviewItems = [];

    const buttonsEl = document.getElementById("quintetaButtons");
    const titleEl = document.getElementById("quintetaTitle");
    const progressEl = document.getElementById("progress");
    const scoreEl = document.getElementById("score");
    const cardEl = document.getElementById("flashcard");
    const problemEl = document.getElementById("problem");
    const hintEl = document.getElementById("hint");
    const tableEl = document.getElementById("tableView");
    const practiceEl = document.getElementById("practice");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const revealBtn = document.getElementById("revealBtn");
    const reviewBtn = document.getElementById("reviewBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const resetBtn = document.getElementById("resetBtn");

    function copyQuinteta(quinteta) {
      return {
        name: quinteta.name,
        items: quinteta.items.map((item) => ({ ...item }))
      };
    }

    function getActiveItems() {
      return mode === "review" ? reviewItems : quintetas[currentQuinteta].items;
    }

    function getActiveTitle() {
      return mode === "review" ? `Repaso hasta Quinteta ${currentQuinteta + 1}` : quintetas[currentQuinteta].name;
    }

    function renderButtons() {
      buttonsEl.innerHTML = "";
      quintetas.forEach((q, index) => {
        const first = q.items[0];
        const last = q.items[q.items.length - 1];
        const button = document.createElement("button");
        button.type = "button";
        button.className = `q-button${index === currentQuinteta ? " active" : ""}`;
        button.innerHTML = `
          <span class="q-title">${q.name}</span>
          <span class="q-detail">${first.a} x ${first.b} ... ${last.a} x ${last.b}</span>
        `;
        button.addEventListener("click", () => selectQuinteta(index, true));
        buttonsEl.appendChild(button);
      });
    }

    function renderCard() {
      const items = getActiveItems();
      const item = items[currentIndex];
      titleEl.textContent = getActiveTitle();
      progressEl.textContent = `Operacion ${currentIndex + 1} de ${items.length}`;
      scoreEl.textContent = `${solved.size} / ${items.length}`;
      problemEl.innerHTML = `
        <span>${item.a}</span>
        <span>x</span>
        <span>${item.b}</span>
        <span class="equals">=</span>
        <span class="answer">${item.answer}</span>
      `;
      cardEl.classList.toggle("revealed", revealed);
      hintEl.textContent = revealed ? "Muy bien. Avanza a la siguiente." : "Toca la tarjeta para ver el resultado";
      revealBtn.textContent = revealed ? "Ocultar" : "Mostrar";
      shuffleBtn.disabled = mode === "review";
      renderTable();
    }

    function renderTable() {
      const items = getActiveItems();
      tableEl.innerHTML = "";
      items.forEach((item, index) => {
        const mini = document.createElement("button");
        mini.type = "button";
        mini.className = `mini${solved.has(index) ? " done" : ""}`;
        const source = mode === "review" ? ` Q${item.quinteta}` : "";
        mini.textContent = revealed && index === currentIndex
          ? `${item.a} x ${item.b} = ${item.answer}${source}`
          : `${item.a} x ${item.b}${source}`;
        mini.addEventListener("click", () => {
          currentIndex = index;
          revealed = solved.has(index);
          renderCard();
          practiceEl.scrollIntoView({ block: "start" });
        });
        tableEl.appendChild(mini);
      });
    }

    function selectQuinteta(index, scrollToPractice = false) {
      currentQuinteta = index;
      currentIndex = 0;
      revealed = false;
      solved = new Set();
      mode = "quinteta";
      reviewItems = [];
      renderButtons();
      renderCard();
      if (scrollToPractice) {
        practiceEl.scrollIntoView({ block: "start" });
      }
    }

    function toggleAnswer() {
      revealed = !revealed;
      if (revealed) {
        solved.add(currentIndex);
      }
      renderCard();
    }

    function nextProblem() {
      currentIndex = (currentIndex + 1) % getActiveItems().length;
      revealed = solved.has(currentIndex);
      renderCard();
    }

    function prevProblem() {
      const items = getActiveItems();
      currentIndex = (currentIndex - 1 + items.length) % items.length;
      revealed = solved.has(currentIndex);
      renderCard();
    }

    function shuffleCurrent() {
      const items = quintetas[currentQuinteta].items;
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      currentIndex = 0;
      revealed = false;
      solved = new Set();
      renderButtons();
      renderCard();
      practiceEl.scrollIntoView({ block: "start" });
    }

    function buildReview() {
      const pool = quintetas
        .slice(0, currentQuinteta + 1)
        .flatMap((q, qIndex) => q.items.map((item) => ({ ...item, quinteta: qIndex + 1 })));
      reviewItems = sampleProblems(pool, 10);
      mode = "review";
      currentIndex = 0;
      revealed = false;
      solved = new Set();
      renderButtons();
      renderCard();
      practiceEl.scrollIntoView({ block: "start" });
    }

    function sampleProblems(pool, total) {
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }

      const selection = shuffled.slice(0, Math.min(total, shuffled.length));
      while (selection.length < total) {
        selection.push(pool[Math.floor(Math.random() * pool.length)]);
      }
      return selection.map((item) => ({ ...item }));
    }

    function resetCurrent() {
      quintetas[currentQuinteta] = copyQuinteta(originalQuintetas[currentQuinteta]);
      currentIndex = 0;
      revealed = false;
      solved = new Set();
      mode = "quinteta";
      reviewItems = [];
      renderButtons();
      renderCard();
      practiceEl.scrollIntoView({ block: "start" });
    }

    cardEl.addEventListener("click", toggleAnswer);
    revealBtn.addEventListener("click", toggleAnswer);
    nextBtn.addEventListener("click", nextProblem);
    prevBtn.addEventListener("click", prevProblem);
    reviewBtn.addEventListener("click", buildReview);
    shuffleBtn.addEventListener("click", shuffleCurrent);
    resetBtn.addEventListener("click", resetCurrent);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") nextProblem();
      if (event.key === "ArrowLeft") prevProblem();
      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();
        toggleAnswer();
      }
    });

    renderButtons();
    renderCard();
  </script>
</body>
</html>
