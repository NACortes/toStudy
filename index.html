<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Quintetas</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #213036;
      --muted: #6b7b82;
      --paper: #fffaf0;
      --panel: #ffffff;
      --line: #ded3bf;
      --accent: #197278;
      --accent-dark: #12565b;
      --answer: #d95d39;
      --blue: #2f6690;
      --shadow: 0 10px 26px rgba(33, 48, 54, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      background: linear-gradient(180deg, #f8f1e4 0%, #edf6f5 100%);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    button,
    select {
      border-radius: 8px;
      font: inherit;
      touch-action: manipulation;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(440px, 100svw);
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0 auto;
      padding: clamp(10px, 3.6svw, 18px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: clamp(10px, 2.8svw, 16px);
    }

    .topbar {
      display: grid;
      gap: clamp(8px, 2.4svw, 12px);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 8svw, 2.1rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .score {
      min-width: clamp(82px, 24svw, 96px);
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 6px 8px;
      text-align: center;
    }

    .score span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .score strong {
      display: block;
      color: var(--accent-dark);
      font-size: clamp(1.1rem, 5.2svw, 1.35rem);
      line-height: 1.1;
    }

    .selector {
      display: grid;
      gap: 6px;
    }

    .selector label {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    select {
      width: 100%;
      min-height: clamp(48px, 12svw, 56px);
      border: 2px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 0 12px;
      font-size: clamp(1rem, 4.5svw, 1.12rem);
      font-weight: 900;
    }

    .practice {
      display: grid;
      align-content: center;
      gap: clamp(8px, 2.8svw, 14px);
      min-height: 0;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: clamp(0.88rem, 3.7svw, 0.98rem);
      font-weight: 800;
      line-height: 1.2;
    }

    .mode {
      color: var(--accent-dark);
      text-align: right;
      white-space: nowrap;
    }

    .flashcard {
      width: 100%;
      min-height: 0;
      height: clamp(250px, 50dvh, 430px);
      padding: clamp(14px, 4svw, 24px);
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      user-select: none;
    }

    .flashcard > div {
      width: 100%;
    }

    .problem {
      display: grid;
      grid-template-columns: auto auto auto;
      align-items: center;
      justify-content: center;
      gap: clamp(9px, 3.2svw, 16px);
      font-size: clamp(3rem, 16svw, 5.1rem);
      font-weight: 900;
      line-height: 1;
      text-align: center;
    }

    .equals {
      grid-column: 1;
    }

    .answer {
      grid-column: 2 / span 2;
      min-width: 1.75em;
      border: clamp(3px, 1svw, 5px) solid var(--ink);
      border-radius: 8px;
      padding: 0.02em 0.16em 0.1em;
      background: #fff;
      color: transparent;
    }

    .flashcard.revealed .answer {
      border-color: var(--answer);
      background: #fff1ec;
      color: var(--answer);
    }

    .hint {
      margin: clamp(12px, 4svw, 20px) 0 0;
      color: var(--muted);
      font-size: clamp(0.92rem, 3.8svw, 1.05rem);
      font-weight: 800;
      line-height: 1.3;
      text-align: center;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .control {
      min-height: clamp(48px, 12svw, 56px);
      padding: 6px;
      background: var(--panel);
      border: 2px solid var(--line);
      color: var(--ink);
      font-size: clamp(0.88rem, 3.7svw, 0.98rem);
      font-weight: 900;
    }

    .control.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .control:disabled {
      opacity: 0.48;
    }

    @media (max-height: 700px) and (orientation: portrait) {
      .app {
        gap: 8px;
      }

      .flashcard {
        height: clamp(210px, 43dvh, 280px);
      }

      .problem {
        font-size: clamp(2.55rem, 14svw, 3.45rem);
      }

      .hint {
        margin-top: 10px;
      }
    }

    @media (orientation: landscape) and (max-height: 540px) {
      body {
        background: linear-gradient(90deg, #f8f1e4 0%, #edf6f5 100%);
      }

      .app {
        width: min(920px, 100svw);
        grid-template-columns: minmax(220px, 0.8fr) minmax(270px, 1fr) minmax(120px, 0.42fr);
        grid-template-rows: minmax(0, 1fr);
        align-items: stretch;
        gap: clamp(8px, 1.8svw, 16px);
        padding: clamp(8px, 2svh, 14px) clamp(10px, 2svw, 18px);
      }

      .topbar,
      .practice,
      .controls {
        min-height: 0;
      }

      .topbar {
        align-content: center;
      }

      .top-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .score {
        width: 100%;
      }

      .practice {
        align-content: stretch;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .status {
        align-items: center;
      }

      .flashcard {
        height: auto;
        min-height: 0;
        padding: clamp(10px, 3svh, 18px);
      }

      .problem {
        font-size: clamp(2.4rem, 10svh, 4rem);
        gap: clamp(7px, 2svh, 13px);
      }

      .hint {
        margin-top: clamp(8px, 2.5svh, 14px);
      }

      .controls {
        grid-template-columns: 1fr;
        align-content: center;
      }

      .control,
      select {
        min-height: clamp(42px, 13svh, 54px);
      }
    }

    @media (max-width: 340px) {
      .app {
        padding-right: 10px;
        padding-left: 10px;
      }

      .problem {
        font-size: clamp(2.45rem, 15svw, 3.2rem);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="top-row">
        <h1>Quintetas</h1>
        <div class="score" aria-live="polite">
          <span>Resueltas</span>
          <strong id="score">0 / 5</strong>
        </div>
      </div>

      <div class="selector">
        <label for="quintetaSelect">Quinteta</label>
        <select id="quintetaSelect" aria-label="Seleccionar quinteta"></select>
      </div>
    </header>

    <section class="practice" aria-label="Practica de multiplicaciones">
      <div class="status">
        <span id="progress">Operacion 1 de 5</span>
        <span class="mode" id="modeLabel">Quinteta 1</span>
      </div>

      <button class="flashcard" id="flashcard" type="button" aria-label="Mostrar resultado">
        <div>
          <div class="problem" id="problem"></div>
          <p class="hint" id="hint">Toca para ver</p>
        </div>
      </button>
    </section>

    <div class="controls" aria-label="Controles">
      <button class="control primary" id="reviewBtn" type="button">Repaso</button>
      <button class="control" id="shuffleBtn" type="button">Mezclar</button>
      <button class="control" id="resetBtn" type="button">Reiniciar</button>
    </div>
  </main>

  <script>
    const originalQuintetas = [
      [[6, 9], [7, 8], [7, 6], [6, 8], [4, 8]],
      [[4, 9], [7, 9], [7, 7], [6, 7], [4, 7]],
      [[7, 5], [5, 9], [8, 8], [9, 7], [8, 5]],
      [[9, 6], [3, 9], [8, 7], [5, 6], [4, 6]],
      [[9, 4], [5, 8], [3, 8], [8, 6], [7, 4]],
      [[6, 6], [9, 5], [8, 9], [3, 6], [8, 3]],
      [[4, 4], [8, 4], [9, 8], [4, 3], [5, 7]],
      [[9, 3], [4, 5], [3, 7], [6, 4], [6, 3]],
      [[6, 5], [3, 4], [5, 5], [9, 9], [5, 3]],
      [[5, 4], [0, 1], [7, 3], [3, 2], [6, 0]]
    ].map((items, index) => ({
      name: `Quinteta ${index + 1}`,
      items: items.map(([a, b], itemIndex) => ({
        a,
        b,
        answer: a * b,
        number: index * 5 + itemIndex + 1
      }))
    }));

    const quintetas = originalQuintetas.map(copyQuinteta);

    let currentQuinteta = 0;
    let currentIndex = 0;
    let revealed = false;
    let solved = new Set();
    let mode = "quinteta";
    let reviewItems = [];

    const selectEl = document.getElementById("quintetaSelect");
    const modeLabelEl = document.getElementById("modeLabel");
    const progressEl = document.getElementById("progress");
    const scoreEl = document.getElementById("score");
    const cardEl = document.getElementById("flashcard");
    const problemEl = document.getElementById("problem");
    const hintEl = document.getElementById("hint");
    const reviewBtn = document.getElementById("reviewBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const resetBtn = document.getElementById("resetBtn");

    function copyQuinteta(quinteta) {
      return {
        name: quinteta.name,
        items: quinteta.items.map((item) => ({ ...item }))
      };
    }

    function getActiveItems() {
      return mode === "review" ? reviewItems : quintetas[currentQuinteta].items;
    }

    function getModeLabel() {
      return mode === "review" ? `Repaso Q${currentQuinteta + 1}` : quintetas[currentQuinteta].name;
    }

    function renderSelector() {
      selectEl.innerHTML = "";
      quintetas.forEach((q, index) => {
        const option = document.createElement("option");
        option.value = String(index);
        option.textContent = q.name;
        option.selected = index === currentQuinteta;
        selectEl.appendChild(option);
      });
    }

    function renderCard() {
      const items = getActiveItems();
      const item = items[currentIndex];
      modeLabelEl.textContent = getModeLabel();
      progressEl.textContent = `${currentIndex + 1} de ${items.length}`;
      scoreEl.textContent = `${solved.size} / ${items.length}`;
      problemEl.innerHTML = `
        <span>${item.a}</span>
        <span>x</span>
        <span>${item.b}</span>
        <span class="equals">=</span>
        <span class="answer">${item.answer}</span>
      `;
      cardEl.classList.toggle("revealed", revealed);
      hintEl.textContent = revealed ? "Toca otra vez para seguir" : "Toca para ver";
      shuffleBtn.disabled = mode === "review";
    }

    function selectQuinteta(index) {
      currentQuinteta = index;
      currentIndex = 0;
      revealed = false;
      solved = new Set();
      mode = "quinteta";
      reviewItems = [];
      renderSelector();
      renderCard();
    }

    function revealAnswer() {
      revealed = true;
      solved.add(currentIndex);
      renderCard();
    }

    function nextProblem() {
      currentIndex = (currentIndex + 1) % getActiveItems().length;
      revealed = false;
      renderCard();
    }

    function handleCardTap() {
      if (revealed) {
        nextProblem();
        return;
      }
      revealAnswer();
    }

    function shuffleCurrent() {
      const items = quintetas[currentQuinteta].items;
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      currentIndex = 0;
      revealed = false;
      solved = new Set();
      mode = "quinteta";
      reviewItems = [];
      renderCard();
    }

    function buildReview() {
      const pool = quintetas
        .slice(0, currentQuinteta + 1)
        .flatMap((q, qIndex) => q.items.map((item) => ({ ...item, quinteta: qIndex + 1 })));
      reviewItems = sampleProblems(pool, 10);
      mode = "review";
      currentIndex = 0;
      revealed = false;
      solved = new Set();
      renderCard();
    }

    function sampleProblems(pool, total) {
      const shuffled = [...pool];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }

      const selection = shuffled.slice(0, Math.min(total, shuffled.length));
      while (selection.length < total) {
        selection.push(pool[Math.floor(Math.random() * pool.length)]);
      }
      return selection.map((item) => ({ ...item }));
    }

    function resetCurrent() {
      quintetas[currentQuinteta] = copyQuinteta(originalQuintetas[currentQuinteta]);
      currentIndex = 0;
      revealed = false;
      solved = new Set();
      mode = "quinteta";
      reviewItems = [];
      renderSelector();
      renderCard();
    }

    selectEl.addEventListener("change", (event) => {
      selectQuinteta(Number(event.target.value));
    });
    cardEl.addEventListener("click", handleCardTap);
    reviewBtn.addEventListener("click", buildReview);
    shuffleBtn.addEventListener("click", shuffleCurrent);
    resetBtn.addEventListener("click", resetCurrent);

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") nextProblem();
      if (event.key === " " || event.key === "Enter") {
        event.preventDefault();
        handleCardTap();
      }
    });

    renderSelector();
    renderCard();
  </script>
</body>
</html>
